services:
  runeach:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${RUNEACH_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      RUNEACH_HOME: "/runeach"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      RUNEACH_DEPLOYMENT_MODE: "authenticated"
      RUNEACH_DEPLOYMENT_EXPOSURE: "private"
      RUNEACH_PUBLIC_URL: "${RUNEACH_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${RUNEACH_DATA_DIR:-./data/docker-runeach}:/runeach"
