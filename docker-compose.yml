services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: swarmifyx
      POSTGRES_PASSWORD: swarmifyx
      POSTGRES_DB: swarmifyx
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarmifyx -d swarmifyx"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://swarmifyx:swarmifyx@db:5432/swarmifyx
      PORT: "3100"
      SERVE_UI: "true"
      SWARMIFYX_DEPLOYMENT_MODE: "authenticated"
      SWARMIFYX_DEPLOYMENT_EXPOSURE: "private"
      SWARMIFYX_PUBLIC_URL: "${SWARMIFYX_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - swarmifyx-data:/swarmifyx
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  swarmifyx-data:
