services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: runeach
      POSTGRES_PASSWORD: runeach
      POSTGRES_DB: runeach
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runeach -d runeach"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://runeach:runeach@db:5432/runeach
      PORT: "3100"
      SERVE_UI: "true"
      RUNEACH_DEPLOYMENT_MODE: "authenticated"
      RUNEACH_DEPLOYMENT_EXPOSURE: "private"
      RUNEACH_PUBLIC_URL: "${RUNEACH_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - runeach-data:/runeach
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  runeach-data:
