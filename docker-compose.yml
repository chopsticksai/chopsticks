services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: chopsticks
      POSTGRES_PASSWORD: chopsticks
      POSTGRES_DB: chopsticks
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chopsticks -d chopsticks"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://chopsticks:chopsticks@db:5432/chopsticks
      PORT: "3100"
      SERVE_UI: "true"
      CHOPSTICKS_DEPLOYMENT_MODE: "authenticated"
      CHOPSTICKS_DEPLOYMENT_EXPOSURE: "private"
      CHOPSTICKS_PUBLIC_URL: "${CHOPSTICKS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - chopsticks-data:/chopsticks
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  chopsticks-data:
