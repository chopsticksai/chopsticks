services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: abacus
      POSTGRES_PASSWORD: abacus
      POSTGRES_DB: abacus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abacus -d abacus"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://abacus:abacus@db:5432/abacus
      PORT: "3100"
      SERVE_UI: "true"
      ABACUS_DEPLOYMENT_MODE: "authenticated"
      ABACUS_DEPLOYMENT_EXPOSURE: "private"
      ABACUS_PUBLIC_URL: "${ABACUS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - abacus-data:/abacus
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  abacus-data:
